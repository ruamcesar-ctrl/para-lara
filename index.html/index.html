```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carta para Lara</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(#fbc2eb,#a6c1ee);
font-family:Arial;
overflow:hidden;
}

/* ENVELOPE */

.envelope{
position:relative;
width:280px;
height:180px;
background:#ff8fa3;
box-shadow:0 15px 25px rgba(0,0,0,0.2);
}

.envelope:before{
content:"";
position:absolute;
border-left:140px solid transparent;
border-right:140px solid transparent;
border-top:90px solid #ff6b81;
top:0;
transform-origin:top;
transition:0.7s;
}

.envelope.open:before{
transform:rotateX(180deg);
}

/* CARTA */

.letter{
position:absolute;
background:white;
width:240px;
height:160px;
left:20px;
bottom:0;
padding:18px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transform:translateY(80px);
transition:0.7s;
font-size:14px;
line-height:1.5;
border-radius:6px;
}

.envelope.open .letter{
transform:translateY(-70px);
}

/* BOTÕES */

.buttons{
margin-top:25px;
}

button{
padding:9px 22px;
margin:5px;
border:none;
background:#ff4d6d;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#e63950;
}

/* FLORES */

.flower{
position:absolute;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

/* CORAÇÕES */

.heart{
position:absolute;
color:#ff4d6d;
font-size:18px;
animation:rise 4s linear forwards;
}

@keyframes rise{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-300px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="envelope" id="env">

<div class="letter">

<b>Lara,</b><br><br>

já que não posso mandá-las pessoalmente,<br>
aqui posso transcrever o que sinto.<br><br>

às vezes as palavras parecem pequenas
perto do que eu realmente sinto,<br>
mas mesmo assim eu queria tentar.

</div>

</div>

<div class="buttons">
<button onclick="openEnv()">OPEN</button>
<button onclick="resetEnv()">RESET</button>
</div>

<script>

function createFlower(){
const flower=document.createElement("div")
flower.className="flower"
flower.innerHTML="🌸"

flower.style.left=Math.random()*window.innerWidth+"px"
flower.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),8000)
}

function createHeart(){
const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"

heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.bottom="0px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)
}

let flowerInterval
let heartInterval

function openEnv(){
document.getElementById("env").classList.add("open")

flowerInterval=setInterval(createFlower,300)
heartInterval=setInterval(createHeart,800)
}

function resetEnv(){
document.getElementById("env").classList.remove("open")

clearInterval(flowerInterval)
clearInterval(heartInterval)
}

</script>

</body>
</html>
