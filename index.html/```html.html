```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tulipas</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(#ffd6e7,#fff);
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* PERGUNTA */

.question{
font-size:30px;
color:#b03060;
margin-bottom:30px;
}

/* BOTÕES */

.buttons{
position:relative;
width:300px;
height:120px;
}

button{
padding:12px 24px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#ccc;
position:absolute;
left:180px;
}

/* TULIPAS DESENHADAS */

.tulip{
position:absolute;
bottom:0;
animation:grow 2s ease forwards;
transform:scale(0);
}

@keyframes grow{
to{transform:scale(1);}
}

/* CORAÇÕES */

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:rise 4s linear forwards;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-300px);opacity:0}
}

/* CARTA */

.letterBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.5s;
}

.letterBox.show{
opacity:1;
pointer-events:auto;
}

.letter{
background:white;
width:320px;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:left;
line-height:1.5;
}

.close{
margin-top:15px;
background:#ff4d6d;
color:white;
}

</style>
</head>

<body>

<div class="question">Você está com saudades? 💖</div>

<div class="buttons">
<button id="yes">SIM</button>
<button id="no">NÃO</button>
</div>

<!-- CARTA -->

<div class="letterBox" id="letterBox">
<div class="letter">

<b>Lara,</b><br><br>

já que não posso mandá-las pessoalmente,<br>
aqui posso transcrever o que sinto.<br><br>

às vezes as palavras parecem pequenas perto
do que eu realmente sinto,<br>
mas mesmo assim eu queria tentar.<br><br>

com carinho,<br>
<b>Ruam</b>

<br>
<button class="close" onclick="closeLetter()">Fechar</button>

</div>
</div>

<script>

/* TULIPAS SVG */

function createTulip(x){

const tulip=document.createElement("div")
tulip.className="tulip"
tulip.style.left=x+"px"

tulip.innerHTML=`
<svg width="40" height="80">
<rect x="19" y="30" width="2" height="50" fill="green"/>
<path d="M10 30 Q20 0 30 30 Z" fill="#ff4d6d"/>
</svg>
`

document.body.appendChild(tulip)

}

for(let i=0;i<7;i++){
createTulip(Math.random()*window.innerWidth)
}

/* CORAÇÕES */

function heart(){

const h=document.createElement("div")
h.className="heart"
h.innerHTML="❤"

h.style.left=Math.random()*window.innerWidth+"px"
h.style.bottom="0px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),4000)

}

setInterval(heart,800)

/* BOTÃO NÃO FUGINDO */

const noBtn=document.getElementById("no")

noBtn.addEventListener("mouseover",()=>{

let x=Math.random()*250
let y=Math.random()*80

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

})

/* MOSTRAR CARTA */

document.getElementById("yes").onclick=function(){
document.getElementById("letterBox").classList.add("show")
}

function closeLetter(){
document.getElementById("letterBox").classList.remove("show")
}

</script>

</body>
</html>
